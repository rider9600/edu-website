name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npm ci
      - run: npm run type-check
      - run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Start server
        run: |
          npm run start &
          sleep 2
      - name: Run E2E tests
        run: npx playwright test --reporter=list
